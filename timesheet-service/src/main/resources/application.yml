server:
  port: 8082

spring:
  application:
    name: timesheet-service

  datasource:
    url: jdbc:mysql://localhost:3306/tms_timesheet_db?createDatabaseIfNotExist=true
    username: root
    password: ch@nd@n_V03
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format-sql: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-retries: 3

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true

jwt:
   secret: tms-super-secret-key-must-be-at-least-256-bits-long-for-hmac!!

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
      path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health, info