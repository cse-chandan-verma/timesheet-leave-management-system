server:
  port: 8083

spring:
  application:
    name: leave-service

  datasource:
    url: jdbc:mysql://localhost:3306/tms_leave_db?createDatabaseIfNotExist=true
    username: root
    password: ch@nd@n_V03
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
       format_sql: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
