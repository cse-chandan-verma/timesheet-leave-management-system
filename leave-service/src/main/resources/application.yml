eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true

jwt:
  secret: tms-super-secret-key-must-be-at-least-256-bits-long-for-hmac!!

springdoc:
   api-docs:
    path: /leave/v3/api-docs
   swagger-ui:
      path: /swagger-ui.html
      disable-swagger-default-url: true

management:
 endpoints:
  web:
  exposure:
   include: health, info