server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:file:../.env[.properties]

  cloud:
    gateway:
         routes:
         - id: auth-service
           uri: lb://auth-service
           predicates:
            - Path=/auth/**

         - id: timesheet-service
           uri: lb://timesheet-service
           predicates:
            - Path=/timesheet/**

         - id: leave-service
           uri: lb://leave-service
           predicates:
             - Path=/leave/**

         - id: admin-service
           uri: lb://admin-service
           predicates:
            - Path=/admin/**

         - id: notification-service
           uri: lb://notification-service
           predicates:
             - Path=/notification/**

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true

jwt:
 secret: ${JWT_SECRET}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: WARN

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: "health,info,gateway"
  endpoint:
    health:
      show-details: always